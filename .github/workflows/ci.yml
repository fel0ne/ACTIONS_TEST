name: Custom OpenBLAS & Tests CI


on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Install Compilers
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gfortran libomp-dev


    - name: Build Custom OpenBLAS
      run: |
        cd OpenBLAS-0.3.31
        make -j$(nproc)


    - name: Run Interface Tests
      run: |
        cd INTR_TESTS
        make clean
        make run


    - name: Run Benchmarks
      run: |
        cd BENCH
        make clean
        make run
